<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex and Grid layout</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .box{
            background-color: greenyellow;
            height: 100px;
            width: 100px;
            padding: 10px;
            margin: 10px;
            border: 2px solid gray;
            border-radius: 10px;
        }

        .container{
            display: flex;
            justify-content:space-evenly;
            
        }

        .new-cotainer{
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            background-color: hotpink;
        }

        .item{
  background-color:darkblue;
            height: 100px;
            width: 200px;
            padding: 10px;
            margin: 10px;
            border: 2px solid gray;
            border-radius: 10px;
            color: white;
        }
        .child{
            color: white;
            background-color: red;
            height: 300px;
            width: 500px;
        }
        .card{
            display: flex;
            background-color: blueviolet;
            align-items: center;
            height: 700px;
            justify-content: center;
        }
    </style>
</head>
<body>
